- name: neihu_nangang
  priority: 1
  districts: [Neihu, Nangang]
  search_urls:
    - https://rent.591.com.tw/list?region=1&section=120,118&rentprice=,30000&shType=1&multiRoom=2,3
    - https://rent.591.com.tw/list?region=1&section=117&rentprice=,30000&shType=1&multiRoom=2,3
  note: >
    Primary target. shType=1 = 整層住家 (whole-floor apartment). multiRoom=2,3
    filters out 1房1廳 and studio/suite (套房). Verify 591 section codes in the
    UI and update if returned districts don't match.

- name: xizhi_neihu_border
  priority: 2
  districts: [Xizhi]
  search_urls:
    - https://rent.591.com.tw/list?region=3&section=28&rentprice=,30000&shType=1&multiRoom=2,3
  note: >
    Xizhi ONLY if the listing is clearly very close (~500m-1km) to the Neihu
    border. Neihu-adjacent signals: 新台五路, 康寧街, 成功路 4-5 段, near 環東大道.
    When proximity is uncertain from the public address / nearby-location info,
    EXCLUDE the listing rather than notifying.

